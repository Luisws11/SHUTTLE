<ion-content [fullscreen]="true">

  <div class="login-wrapper">

    <!-- Tombol Kembali ke Onboarding -->
    <div class="back-btn">
      <ion-button fill="clear" routerLink="/onboarding">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </div>

    <!-- Header Logo & Judul Aplikasi -->
    <div class="header">
      <div class="logo-circle">
        <ion-icon name="trophy-outline"></ion-icon>
      </div>
      <h1>LET'S PLAY</h1>
      <p>Welcome Back to SHUTTLE</p>
    </div>

    <!-- Form Kartu Login -->
    <div class="form-card">

      <!-- Input Box: Email -->
      <ion-item lines="none">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          [(ngModel)]="email"
          placeholder="Enter your email">
        </ion-input>
      </ion-item>

      <!-- Input Box: Password -->
      <ion-item lines="none">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        
        <ion-input
          type="password"
          [(ngModel)]="password"
          placeholder="Enter your password">
          
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
          
        </ion-input>
      </ion-item>

      <!-- Fitur Lupa Password -->
      <div class="forgot-password">
        <span routerLink="/forgot-password">
          Forgot Password?
        </span>
      </div>

      <!-- Tombol Eksekusi Login -->
      <ion-button
        expand="block"
        class="login-btn"
        (click)="onLogin()">
        Login
      </ion-button>

      <!-- Garis Pembatas Login Sosial -->
      <div class="divider">
        <span>Or continue with</span>
      </div>

      <!-- Tombol Alternatif Login Sosial -->
      <div class="social-login">
        <div class="social-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Facebook">
        </div>
        <div class="social-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google">
        </div>
        <div class="social-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" alt="Apple">
        </div>
      </div>

      <!-- Navigasi ke Halaman Register -->
      <div class="register">
        Don't have an account?
        <span routerLink="/register">
          Register Now
        </span>
      </div>

    </div>

  </div>

</ion-content>
