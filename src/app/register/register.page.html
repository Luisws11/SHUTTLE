<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button color="dark" class="back-btn" routerLink="/onboarding" routerDirection="back">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="auth-content">
  <div class="auth-container">
    
    <div class="auth-header">
      <div class="illustration-box short-illustration">
        <img src="assets/images/logo/logo1.png" alt="Register Illustration">
      </div>
      <h2>FILL YOUR ENERGY!</h2>
    </div>

    <div class="form-container">
      
      <ion-item lines="none" class="custom-input-item">
        <ion-input 
          type="text" 
          [(ngModel)]="name"
          style="color: #000000 !important; --color: #000000 !important;"
          placeholder="Username">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input-item">
        <ion-input 
          type="email" 
          [(ngModel)]="email"
          style="color: #000000 !important; --color: #000000 !important;"
          placeholder="Email">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input-item">
        <ion-input 
          type="password" 
          [(ngModel)]="password"
          style="color: #000000 !important; --color: #000000 !important;"
          placeholder="Password">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input-item">
        <ion-input 
          type="password" 
          style="color: #000000 !important; --color: #000000 !important;"
          placeholder="Confirm Password">
        </ion-input>
      </ion-item>

      <ion-button 
        expand="block" 
        style="--background: #2dd36f; --background-activated: #28ba62; color: white; font-weight: bold; margin-top: 20px;"
        (click)="onRegister()">
        Agree and Register
      </ion-button>

    </div>

    <div class="divider-container">
      <span class="divider-text">Or Login with</span>
    </div>

    <div class="social-container">
      <ion-button fill="outline" class="social-btn">
        <img src="assets/images/logo/facebook.png" alt="Facebook">
      </ion-button>
      <ion-button fill="outline" class="social-btn">
        <img src="assets/images/logo/google.png" alt="Google">
      </ion-button>
      <ion-button fill="outline" class="social-btn">
        <img src="assets/images/logo/apple.png" alt="Apple">
      </ion-button>
    </div>

  </div>
</ion-content>
