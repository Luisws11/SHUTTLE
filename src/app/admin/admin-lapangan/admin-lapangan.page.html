<ion-content [fullscreen]="true">

  <div class="lapangan-container">

    <!-- Header -->
    <div class="header">

      <div>
        <h1>Kelola Lapangan</h1>
        <p>Atur seluruh lapangan yang tersedia</p>
      </div>

      <button
        class="add-btn"
        (click)="tambahLapangan()">

        + Tambah

      </button>

    </div>

    <!-- Daftar Lapangan -->

    <div
      class="lapangan-card"
      *ngFor="let lapangan of lapanganList">

      <div class="lapangan-top">

        <div class="lapangan-icon">
          🏸
        </div>

        <div class="lapangan-info">

          <h3>
            {{ lapangan.nama }}
          </h3>

          <span>
            {{ lapangan.tipe }} • {{ lapangan.slot }} Slot
          </span>

        </div>

      </div>

      <div class="price">
        Rp {{ lapangan.harga }} / Jam
      </div>

      <div class="action-row">

        <button
          class="edit-btn"
          (click)="editLapangan(lapangan)">

          Edit

        </button>

        <button
          class="delete-btn"
          (click)="hapusLapangan(lapangan)">

          Hapus

        </button>

      </div>

    </div>

    <!-- Empty State -->
    <div
      class="empty-state"
      *ngIf="lapanganList.length === 0">

      <div class="empty-icon">
        🏸
      </div>

      <h3>Belum Ada Lapangan</h3>

      <p>
        Tambahkan lapangan baru untuk mulai menerima booking.
      </p>

    </div>

  </div>

</ion-content>
