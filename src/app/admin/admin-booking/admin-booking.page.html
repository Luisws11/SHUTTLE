<ion-content [fullscreen]="true">

  <div class="booking-container">

    <div
      class="back-link"
      (click)="goToOperasional()">

      ← Operasional

    </div>

    <div class="header">

      <h1>Kelola Booking</h1>

      <p>
        Kelola seluruh pemesanan lapangan
      </p>

    </div>

    <div class="search-box">
      🔍 Cari Booking...
    </div>

    <div
      class="booking-card"
      *ngFor="let booking of bookingList">

      <div class="booking-top">

        <div>

          <h3>{{ booking.nama }}</h3>

          <span>
            {{ booking.lapangan }}
          </span>

        </div>

        <div
          class="status"
          [ngClass]="{
            'pending': booking.status === 'Pending',
            'approved': booking.status === 'Disetujui',
            'rejected': booking.status === 'Ditolak'
          }">

          {{ booking.status }}

        </div>

      </div>

      <div class="booking-time">
        🕒 {{ booking.jam }}
      </div>

      <div
        class="action-buttons"
        *ngIf="booking.status === 'Pending'">

        <button
          class="approve-btn"
          (click)="setujuiBooking(booking)">

          ✓ Terima

        </button>

        <button
          class="reject-btn"
          (click)="tolakBooking(booking)">

          ✕ Tolak

        </button>

      </div>

      <button
        class="detail-btn"
        (click)="lihatDetail(booking)">

        Lihat Detail

      </button>

    </div>

  </div>

</ion-content>
